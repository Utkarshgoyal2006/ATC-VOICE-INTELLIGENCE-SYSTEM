{% extends "base.html" %}

{% block content %}

<h2>Login</h2>

<form method="POST">

    {{ form.hidden_tag() }}

    {{ form.email.label }}<br>
    {{ form.email(size=35) }}<br><br>

    {{ form.password.label }}<br>
    {{ form.password(size=35) }}<br><br>

    {{ form.submit() }}

</form>

<p>

Don't have an account?

<a href="{{ url_for('register') }}">

Register

</a>

</p>

{% endblock %}
